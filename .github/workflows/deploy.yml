name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build and Prerender
        run: npm run build
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
      
      - name: List dist contents
        run: |
          echo "=== dist folder contents ==="
          ls -la dist/
          echo "=== checking .well-known ==="
          ls -la dist/.well-known/ || echo "no .well-known"
          echo "=== checking invite ==="
          ls -la dist/invite/ || echo "no /invite"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
