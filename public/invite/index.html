<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyric Genie</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #fff;
      text-align: center;
    }
    .container { padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #aaa; margin-bottom: 1.5rem; }
    a {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
    }
    .status { font-size: 0.9rem; color: #888; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="title">Open Lyric Genie</h1>
    <p id="subtitle">Opening the app&hellip;</p>
    <a href="https://apps.apple.com/app/id6739787614">Get Lyric Genie</a>
    <p class="status" id="status"></p>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var appStoreUrl = 'https://apps.apple.com/app/id6739787614';

      if (code) {
        document.getElementById('title').textContent = "You've been invited to collaborate!";
        document.getElementById('subtitle').textContent = 'Opening Lyric Genie\u2026';
        window.location.href = 'lyricgenie://invite?code=' + encodeURIComponent(code);
      } else {
        window.location.href = 'lyricgenie://';
      }

      setTimeout(function() {
        document.getElementById('status').textContent = 'App not found. Redirecting to App Store\u2026';
        window.location.href = appStoreUrl;
      }, 1500);
    })();
  </script>
</body>
</html>
